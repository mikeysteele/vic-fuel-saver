name: "Setup OpenTofu"
description: "Setup OpenTofu with specified version"
inputs:
  tofu-version:
    description: "OpenTofu version to use"
    required: false
    default: "1.6.0"

runs:
  using: "composite"
  steps:
    - name: Setup OpenTofu
      uses: opentofu/setup-opentofu@v1
      with:
        version: ${{ inputs.tofu-version }}
