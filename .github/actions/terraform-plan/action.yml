name: "OpenTofu Plan"
description: "Run tofu plan"
inputs:
  working-directory:
    description: "Working directory for OpenTofu commands"
    required: false
    default: "./terraform"
  cloudflare-api-token:
    description: "Cloudflare API token"
    required: true
  cloudflare-account-id:
    description: "Cloudflare Account ID"
    required: true
  gemini-api-key:
    description: "Gemini API key (optional)"
    required: false
  r2-access-key:
    description: "R2 Access Key ID for backend"
    required: true
  r2-secret-key:
    description: "R2 Secret Access Key for backend"
    required: true

runs:
  using: "composite"
  steps:
    - name: OpenTofu Plan
      working-directory: ${{ inputs.working-directory }}
      run: |
        set +e
        echo "Running tofu plan..."
        timeout 60 tofu plan -out=tfplan -detailed-exitcode -no-color -refresh=false -lock=false -input=false 2>&1 | tee /tmp/tofu-plan.log
        exit_code=$?
        set -e

        echo ""
        echo "=== Plan completed ==="
        echo "Exit code: $exit_code"

        if [ -f /tmp/tofu-plan.log ]; then
          echo "=== Plan output ==="
          cat /tmp/tofu-plan.log || echo "Could not read log file"
        fi

        # Exit code 0 = no changes, 1 = error, 2 = changes present, 124 = timeout
        if [ "$exit_code" = "124" ]; then
          echo "ERROR: Plan timed out after 60 seconds"
          exit 1
        elif [ "$exit_code" = "2" ]; then
          echo "Plan completed successfully with changes detected"
          exit 0
        elif [ "$exit_code" = "0" ]; then
          echo "Plan completed successfully with no changes"
          exit 0
        else
          echo "Plan failed with exit code: $exit_code"
          exit $exit_code
        fi
      env:
        TF_VAR_cloudflare_api_token: ${{ inputs.cloudflare-api-token }}
        TF_VAR_cloudflare_account_id: ${{ inputs.cloudflare-account-id }}
        TF_VAR_gemini_api_key: ${{ inputs.gemini-api-key }}
        AWS_ACCESS_KEY_ID: ${{ inputs.r2-access-key }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.r2-secret-key }}
        TF_LOG: DEBUG
      shell: bash
