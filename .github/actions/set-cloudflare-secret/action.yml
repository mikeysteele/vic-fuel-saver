name: "Set Cloudflare Pages Secret"
description: "Set a secret in Cloudflare Pages using wrangler"
inputs:
  secret-name:
    description: "Name of the secret to set"
    required: true
  secret-value:
    description: "Value of the secret"
    required: true
  project-name:
    description: "Cloudflare Pages project name"
    required: true
  account-id:
    description: "Cloudflare Account ID"
    required: true
  api-token:
    description: "Cloudflare API token"
    required: true

runs:
  using: "composite"
  steps:
    - name: Set Cloudflare Pages Secret
      run: |
        echo '${{ inputs.secret-value }}' | npx -y wrangler@latest pages secret put ${{ inputs.secret-name }} \
          --project-name=${{ inputs.project-name }}
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.api-token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.account-id }}
      shell: bash
