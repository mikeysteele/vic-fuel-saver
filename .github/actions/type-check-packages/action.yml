name: "Type Check Packages"
description: "Type check packages in dependency order"
runs:
  using: "composite"
  steps:
    - name: Type check base packages
      run: |
        pnpm --filter @wordsearchy/shared type-check
        pnpm --filter @wordsearchy/ui-components type-check
      shell: bash

    - name: Type check puzzle-generator
      run: |
        pnpm --filter @wordsearchy/puzzle-generator type-check
      shell: bash

    - name: Type check dependent packages
      run: |
        pnpm --filter @wordsearchy/block-editor type-check
        pnpm --filter @wordsearchy/server type-check
      shell: bash
