name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Code Quality and Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node (for ESLint/Playwright deps)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: deno install --frozen

      - name: Type Check
        run: deno check src/ && deno check tests/

      - name: Code Formatting Check
        run: deno fmt --check

      - name: Linter Check
        run: deno task lint

      - name: Unit Tests
        run: deno task test
