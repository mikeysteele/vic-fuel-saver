name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # Infrastructure provisioning
  terraform:
    name: Infrastructure (OpenTofu)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: ./.github/actions/terraform-setup

      - name: OpenTofu Init
        uses: ./.github/actions/terraform-init
        with:
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          r2-access-key: ${{ secrets.R2_ACCESS_KEY }}
          r2-secret-key: ${{ secrets.R2_SECRET_KEY }}

      - name: OpenTofu Validate
        uses: ./.github/actions/terraform-validate

      - name: OpenTofu Plan
        id: plan
        uses: ./.github/actions/terraform-plan
        timeout-minutes: 10
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          r2-access-key: ${{ secrets.R2_ACCESS_KEY }}
          r2-secret-key: ${{ secrets.R2_SECRET_KEY }}

      - name: OpenTofu Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: ./.github/actions/terraform-apply
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          r2-access-key: ${{ secrets.R2_ACCESS_KEY }}
          r2-secret-key: ${{ secrets.R2_SECRET_KEY }}

      - name: Set Cloudflare Pages Secret (Main App)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: ./.github/actions/set-cloudflare-secret
        with:
          secret-name: GEMINI_API_KEY
          secret-value: ${{ secrets.GEMINI_API_KEY }}
          project-name: word-search-wizard
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set Cloudflare Pages Secret (Multiplayer)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: ./.github/actions/set-cloudflare-secret
        with:
          secret-name: GEMINI_API_KEY
          secret-value: ${{ secrets.GEMINI_API_KEY }}
          project-name: word-search-wizard-multiplayer
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # Main application deployment
  deploy-pages:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [terraform]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      deployments: write
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://word-search-wizard.pages.dev
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: cloudflare-build
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=word-search-wizard --branch=${{ github.ref_name }}

      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment?.id || 0,
              state: 'success',
              environment: '${{ github.event.inputs.environment || 'production' }}',
              description: 'Deployment to Cloudflare Pages successful',
              environment_url: 'https://word-search-wizard.pages.dev'
            });

  # Multiplayer game deployment
  deploy-multiplayer:
    name: Deploy Multiplayer Game
    runs-on: ubuntu-latest
    needs: [terraform]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      deployments: write
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://word-search-wizard-multiplayer.pages.dev
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        uses: ./.github/actions/build-packages

      - name: Build multiplayer game
        run: pnpm build:multiplayer

      - name: Deploy multiplayer to Cloudflare Pages
        id: deploy-multiplayer
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/multiplayer-game --project-name=word-search-wizard-multiplayer --branch=${{ github.ref_name }}

      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment?.id || 0,
              state: 'success',
              environment: '${{ github.event.inputs.environment || 'production' }}',
              description: 'Multiplayer game deployment to Cloudflare Pages successful',
              environment_url: 'https://word-search-wizard-multiplayer.pages.dev'
            });

  # Deployment verification
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-pages, deploy-multiplayer]
    if: always() && (needs.deploy-pages.result == 'success' || needs.deploy-multiplayer.result == 'success')
    timeout-minutes: 5

    steps:
      - name: Verify Pages deployment
        run: |
          echo "✅ Deployment verification"
          echo "Main app: https://word-search-wizard.pages.dev"
          echo "Multiplayer: https://word-search-wizard-multiplayer.pages.dev"

      - name: Health check
        run: |
          echo "Running health checks..."
          # Add actual health check logic here if needed
